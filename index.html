<!DOCTYPE html><html lang="en-GB"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>WJEC GCSE Newton's Laws and Planets Quiz</title><style>
:root{--green:#16a34a;--red:#dc2626;--yellow:#ca8a04;--indigo:#4f46e5;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,#e0e7ff,#dbeafe,#fef3c7);color:var(--text);padding:16px;display:flex;align-items:center;justify-content:center}.app{width:100%;max-width:820px;background:#fff;border-radius:28px;padding:24px;box-shadow:0 24px 60px rgba(15,23,42,.18)}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}h1{margin:0;font-size:clamp(1.7rem,6vw,2.3rem);line-height:1.1}.subtitle{margin:8px 0 0;color:var(--muted)}.score{background:#e0e7ff;color:#3730a3;border-radius:18px;padding:10px 14px;font-weight:700;white-space:nowrap}.meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.92rem;margin-bottom:12px}.progress{width:100%;height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:28px}.progress-bar{height:100%;background:var(--indigo);width:0%;transition:width .35s ease}.question{font-size:clamp(1.3rem,5vw,1.7rem);line-height:1.3;margin:0 0 24px}.options{display:grid;gap:12px;margin-bottom:22px}button{font:inherit}.option{border:2px solid var(--border);background:#fff;border-radius:18px;padding:16px;text-align:left;font-size:1.05rem;font-weight:650;cursor:pointer;transition:transform .12s ease,border-color .15s ease,background .15s ease}.option:active{transform:scale(.99)}.option:hover{border-color:#818cf8}.option.correct{border-color:#22c55e;background:#dcfce7;color:#166534}.option.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}.option:disabled{cursor:default}.explanation{display:none;background:#eef2ff;border-left:5px solid var(--indigo);border-radius:18px;padding:18px;margin-bottom:20px}.explanation.show{display:block}.explanation h2{color:#3730a3;margin:0 0 10px;font-size:1.25rem}.explanation p{margin:8px 0;line-height:1.5}.actions{display:flex;justify-content:flex-end}.next,.restart{border:0;border-radius:18px;color:#fff;background:var(--green);padding:14px 20px;font-weight:800;cursor:pointer}.restart{background:var(--indigo)}.footer{margin-top:24px;padding-top:18px;border-top:1px solid var(--border);color:var(--muted);font-size:.9rem;line-height:1.45}.result{text-align:center}.result h1{font-size:clamp(2rem,7vw,2.8rem);margin-bottom:14px}.result-score{font-size:1.45rem;line-height:1.5;margin-bottom:10px}.result-message{font-size:1.15rem;font-weight:750;margin:18px 0 24px}@media(max-width:540px){body{align-items:flex-start;padding:10px}.app{border-radius:22px;padding:18px}.top{flex-direction:column}.meta{flex-direction:column}.score{width:fit-content}.option{font-size:1rem;padding:15px}.actions{justify-content:stretch}.next,.restart{width:100%}}</style></head><body><main class="app" id="app"></main><script>
const questions = [{"topic": "Intro – Forces", "question": "What is a force?", "options": ["A push or a pull", "A type of energy store", "The distance travelled each second", "The amount of matter in an object"], "answer": "A push or a pull", "explanation": "A force is a push or a pull. Forces can change the speed, direction or shape of an object."}, {"topic": "Intro – Forces", "question": "What unit is force measured in?", "options": ["Joule", "Newton", "Watt", "Metre"], "answer": "Newton", "explanation": "Force is measured in newtons, written as N."}, {"topic": "Intro – Forces", "question": "What is mass?", "options": ["The amount of matter in an object", "The force of gravity on an object", "The speed of an object", "The size of an orbit"], "answer": "The amount of matter in an object", "explanation": "Mass is the amount of matter in an object. It is measured in kilograms."}, {"topic": "Intro – Forces", "question": "What is weight?", "options": ["The gravitational force on an object", "The amount of matter in an object", "The distance around a planet", "The speed of a satellite"], "answer": "The gravitational force on an object", "explanation": "Weight is a force caused by gravity. It is measured in newtons."}, {"topic": "Intro – Forces", "question": "Which equation links weight, mass and gravitational field strength?", "options": ["W = m × g", "F = m × a", "v = d ÷ t", "P = E ÷ t"], "answer": "W = m × g", "explanation": "Weight = mass × gravitational field strength. This is written as W = mg."}, {"topic": "Intro – Forces", "question": "What does resultant force mean?", "options": ["The overall force after all forces are combined", "Only the largest force acting", "The force of gravity only", "A force that always acts upwards"], "answer": "The overall force after all forces are combined", "explanation": "The resultant force is the single overall force produced when all forces on an object are combined."}, {"topic": "Intro – Forces", "question": "If two equal forces act in opposite directions, what is the resultant force?", "options": ["Zero", "Twice one force", "Half one force", "Always 10 N"], "answer": "Zero", "explanation": "Equal opposite forces balance, so the resultant force is zero."}, {"topic": "Intro – Newton’s Laws", "question": "What does Newton’s first law describe?", "options": ["Motion when the resultant force is zero", "How to calculate electrical power", "How waves refract", "How atoms decay"], "answer": "Motion when the resultant force is zero", "explanation": "Newton’s first law says an object remains stationary or moves at constant velocity unless acted on by a resultant force."}, {"topic": "Intro – Newton’s Laws", "question": "What is inertia?", "options": ["The tendency of an object to resist changes in motion", "The force pulling objects to Earth only", "The distance travelled in one second", "The energy stored in a battery"], "answer": "The tendency of an object to resist changes in motion", "explanation": "Inertia is an object’s resistance to changes in its motion. Greater mass means greater inertia."}, {"topic": "Intro – Newton’s Laws", "question": "Which object has the greatest inertia?", "options": ["A 1 kg book", "A 3 kg bag", "A 20 kg suitcase", "A 0.5 kg bottle"], "answer": "A 20 kg suitcase", "explanation": "The object with the greatest mass has the greatest inertia, so the 20 kg suitcase has the greatest inertia."}, {"topic": "Newton’s Laws – Exam Style", "question": "Which equation is Newton’s second law?", "options": ["F = m × a", "W = F × d", "v = f × λ", "P = V × I"], "answer": "F = m × a", "explanation": "Newton’s second law links resultant force, mass and acceleration: F = ma."}, {"topic": "Newton’s Laws – Exam Style", "question": "A 5 kg trolley accelerates at 2 m/s². What is the resultant force on it?", "options": ["2.5 N", "7 N", "10 N", "25 N"], "answer": "10 N", "explanation": "Use F = m × a. 5 × 2 = 10 N."}, {"topic": "Newton’s Laws – Exam Style", "question": "A 4 kg object has a resultant force of 20 N. What is its acceleration?", "options": ["0.2 m/s²", "5 m/s²", "16 m/s²", "80 m/s²"], "answer": "5 m/s²", "explanation": "Rearrange F = ma to a = F ÷ m. 20 ÷ 4 = 5 m/s²."}, {"topic": "Newton’s Laws – Exam Style", "question": "A car is travelling at constant velocity. What can be said about the resultant force on it?", "options": ["It is zero", "It acts forwards only", "It is increasing", "It equals the car’s mass"], "answer": "It is zero", "explanation": "Constant velocity means there is no acceleration, so the resultant force is zero."}, {"topic": "Newton’s Laws – Exam Style", "question": "A box is pushed with 30 N to the right and friction is 10 N to the left. What is the resultant force?", "options": ["10 N to the right", "20 N to the right", "30 N to the left", "40 N to the right"], "answer": "20 N to the right", "explanation": "Opposite forces subtract. 30 N - 10 N = 20 N to the right."}, {"topic": "Newton’s Laws – Exam Style", "question": "A parachutist is falling at terminal velocity. What is the resultant force?", "options": ["Zero", "Equal to mass", "Greater than weight", "Upwards only"], "answer": "Zero", "explanation": "At terminal velocity, air resistance balances weight, so the resultant force is zero."}, {"topic": "Newton’s Laws – Exam Style", "question": "Why does a falling object accelerate at first?", "options": ["Weight is greater than air resistance", "Air resistance is greater than weight", "There is no gravity", "Mass becomes smaller"], "answer": "Weight is greater than air resistance", "explanation": "At the start, air resistance is small, so weight is the larger force and there is a downward resultant force."}, {"topic": "Newton’s Laws – Exam Style", "question": "Why does air resistance increase as a falling object speeds up?", "options": ["It collides with more air particles each second", "Its mass increases", "Gravity switches off", "The object becomes magnetic"], "answer": "It collides with more air particles each second", "explanation": "At higher speeds, the object hits more air particles per second, increasing drag."}, {"topic": "Newton’s Laws – Exam Style", "question": "What happens to acceleration if the same force acts on a larger mass?", "options": ["Acceleration decreases", "Acceleration increases", "Acceleration stays the same", "Acceleration becomes infinite"], "answer": "Acceleration decreases", "explanation": "From F = ma, for the same force, a larger mass gives a smaller acceleration."}, {"topic": "Newton’s Laws – Exam Style", "question": "A 60 kg person stands on Earth where g = 10 N/kg. What is their weight?", "options": ["6 N", "50 N", "60 N", "600 N"], "answer": "600 N", "explanation": "Use W = m × g. 60 × 10 = 600 N."}, {"topic": "Newton’s Laws – Exam Style", "question": "A student says mass and weight are the same thing. Why is this wrong?", "options": ["Mass is matter in kg; weight is a force in N", "Mass is measured in newtons and weight in kilograms", "Weight never changes but mass always changes", "Mass only exists in space"], "answer": "Mass is matter in kg; weight is a force in N", "explanation": "Mass is the amount of matter and is measured in kg. Weight is the gravitational force and is measured in N."}, {"topic": "Newton’s Laws – Exam Style", "question": "On the Moon, gravitational field strength is lower than on Earth. What happens to an astronaut’s mass and weight on the Moon?", "options": ["Mass same, weight lower", "Mass lower, weight same", "Both become zero", "Both increase"], "answer": "Mass same, weight lower", "explanation": "Mass does not depend on location, but weight depends on gravitational field strength."}, {"topic": "Newton’s Laws – Exam Style", "question": "Which pair of forces is balanced for a book resting on a table?", "options": ["Weight down and support force up", "Friction and gravity both down", "Air resistance and thrust", "Magnetism and electricity"], "answer": "Weight down and support force up", "explanation": "The book is stationary, so its downward weight is balanced by the upward support force from the table."}, {"topic": "Newton’s Laws – Exam Style", "question": "If a resultant force acts on an object in the opposite direction to its motion, what happens?", "options": ["It slows down", "It must speed up", "Its mass doubles", "It cannot move"], "answer": "It slows down", "explanation": "A resultant force opposite to the direction of motion causes deceleration."}, {"topic": "Newton’s Laws – Exam Style", "question": "Why are seatbelts useful during sudden braking?", "options": ["They provide a force to slow the passenger down", "They remove all inertia", "They increase reaction time", "They make the car lighter"], "answer": "They provide a force to slow the passenger down", "explanation": "Due to inertia, a passenger would keep moving forwards. The seatbelt provides a force to decelerate them safely."}, {"topic": "Intro – Planets and Space", "question": "What is a planet?", "options": ["A large object that orbits a star", "A small piece of rock orbiting Earth only", "A type of galaxy", "A source of nuclear radiation"], "answer": "A large object that orbits a star", "explanation": "A planet is a large body that orbits a star, such as Earth orbiting the Sun."}, {"topic": "Intro – Planets and Space", "question": "What is a moon?", "options": ["A natural satellite that orbits a planet", "A star that gives out light", "A planet outside the Solar System", "A galaxy"], "answer": "A natural satellite that orbits a planet", "explanation": "A moon is a natural satellite. For example, the Moon orbits Earth."}, {"topic": "Intro – Planets and Space", "question": "What is an orbit?", "options": ["The curved path of one object around another", "The distance light travels in a year", "The surface of a planet", "The brightness of a star"], "answer": "The curved path of one object around another", "explanation": "An orbit is the path followed by an object as it moves around another object due to gravity."}, {"topic": "Intro – Planets and Space", "question": "What force keeps planets in orbit around the Sun?", "options": ["Gravity", "Friction", "Air resistance", "Static electricity"], "answer": "Gravity", "explanation": "Gravity pulls planets towards the Sun and keeps them moving in orbit."}, {"topic": "Intro – Planets and Space", "question": "What is the Solar System?", "options": ["The Sun and the objects that orbit it", "Only the Earth and Moon", "All galaxies in the Universe", "Only the planets with rings"], "answer": "The Sun and the objects that orbit it", "explanation": "The Solar System includes the Sun, planets, moons, dwarf planets, asteroids and comets."}, {"topic": "Intro – Planets and Space", "question": "Which object is at the centre of our Solar System?", "options": ["The Sun", "Earth", "The Moon", "Jupiter"], "answer": "The Sun", "explanation": "The Sun is the star at the centre of our Solar System."}, {"topic": "Intro – Planets and Space", "question": "What is a galaxy?", "options": ["A huge collection of stars", "A single planet", "A moon of Jupiter", "A force field"], "answer": "A huge collection of stars", "explanation": "A galaxy is a very large collection of stars, gas and dust held together by gravity."}, {"topic": "Intro – Planets and Space", "question": "What is the name of our galaxy?", "options": ["The Milky Way", "Andromeda", "The Solar System", "The Big Bang"], "answer": "The Milky Way", "explanation": "Our Solar System is inside a galaxy called the Milky Way."}, {"topic": "Intro – Planets and Space", "question": "What is a light-year?", "options": ["The distance light travels in one year", "The time Earth takes to orbit the Sun", "The age of a star", "The brightness of a galaxy"], "answer": "The distance light travels in one year", "explanation": "A light-year is a distance, not a time. It is used for very large distances in space."}, {"topic": "Intro – Planets and Space", "question": "Why are distances in space often measured in light-years?", "options": ["The distances are extremely large", "Light-years are smaller than metres", "Planets only move at night", "Gravity cannot be measured"], "answer": "The distances are extremely large", "explanation": "Space distances are so huge that metres and kilometres become inconvenient, so light-years are used."}, {"topic": "Planets and Orbits – Exam Style", "question": "Why does a planet continue moving in an orbit instead of travelling in a straight line?", "options": ["Gravity constantly changes its direction", "Friction pushes it around the Sun", "The Sun repels the planet", "There are no forces in space"], "answer": "Gravity constantly changes its direction", "explanation": "Without gravity, the planet would move in a straight line. Gravity pulls it towards the Sun and changes its direction, producing an orbit."}, {"topic": "Planets and Orbits – Exam Style", "question": "What provides the centripetal force for a planet orbiting the Sun?", "options": ["Gravity from the Sun", "Air resistance", "Friction with space", "Magnetic force from Earth"], "answer": "Gravity from the Sun", "explanation": "The centripetal force needed for orbital motion is provided by the Sun’s gravitational attraction."}, {"topic": "Planets and Orbits – Exam Style", "question": "A satellite is in a circular orbit. What is changing even if its speed stays constant?", "options": ["Direction of velocity", "Mass", "Weight is zero", "Amount of matter"], "answer": "Direction of velocity", "explanation": "Velocity includes direction. In circular motion, the direction constantly changes, so the satellite is accelerating."}, {"topic": "Planets and Orbits – Exam Style", "question": "Why is an orbiting satellite accelerating even if its speed is constant?", "options": ["Its direction is constantly changing", "Its mass is increasing", "It has no gravity acting on it", "It is losing all energy"], "answer": "Its direction is constantly changing", "explanation": "Acceleration means change in velocity. Velocity changes if direction changes, even when speed is constant."}, {"topic": "Planets and Orbits – Exam Style", "question": "What happens to gravitational force as the distance between two masses increases?", "options": ["It decreases", "It increases", "It becomes friction", "It stays exactly the same always"], "answer": "It decreases", "explanation": "Gravitational attraction becomes weaker as the distance between masses increases."}, {"topic": "Planets and Orbits – Exam Style", "question": "Which planet would have the strongest gravitational pull at its surface, assuming it has the greatest mass and similar size?", "options": ["The most massive planet", "The least massive planet", "The coldest planet", "The planet furthest from the Sun"], "answer": "The most massive planet", "explanation": "Greater mass gives a stronger gravitational field, if size is similar."}, {"topic": "Planets and Orbits – Exam Style", "question": "What is an artificial satellite?", "options": ["A human-made object placed in orbit", "A natural moon", "A star outside the Solar System", "A planet made of gas"], "answer": "A human-made object placed in orbit", "explanation": "Artificial satellites are built by humans and placed in orbit for uses such as communication, weather monitoring and navigation."}, {"topic": "Planets and Orbits – Exam Style", "question": "Why are geostationary satellites useful for communication?", "options": ["They stay above the same point on Earth", "They orbit the Moon once per hour", "They are always below the atmosphere", "They produce their own gravity"], "answer": "They stay above the same point on Earth", "explanation": "A geostationary satellite orbits once every 24 hours above the equator, so it appears fixed above the same point."}, {"topic": "Planets and Orbits – Exam Style", "question": "What is the approximate shape of a planet’s orbit around the Sun?", "options": ["Nearly circular / elliptical", "A perfect square", "A straight line", "A zigzag path"], "answer": "Nearly circular / elliptical", "explanation": "Planets move in elliptical orbits, many of which are close to circular."}, {"topic": "Planets and Orbits – Exam Style", "question": "Which statement best describes the Big Bang theory?", "options": ["The Universe expanded from a very hot, dense state", "The Earth exploded to form the Moon", "The Sun is the whole Universe", "Planets were made by chemical reactions in oceans"], "answer": "The Universe expanded from a very hot, dense state", "explanation": "The Big Bang theory says the Universe began in a very hot, dense state and has been expanding ever since."}, {"topic": "Planets and Orbits – Exam Style", "question": "What does red-shift from distant galaxies suggest?", "options": ["The Universe is expanding", "The Universe is shrinking", "All galaxies are stationary", "The Earth is not moving"], "answer": "The Universe is expanding", "explanation": "Red-shift shows that distant galaxies are moving away from us, supporting the idea of an expanding Universe."}, {"topic": "Planets and Orbits – Exam Style", "question": "If a galaxy is further away and has a larger red-shift, what does that usually suggest?", "options": ["It is moving away faster", "It is moving towards us faster", "It is inside the Solar System", "It gives out no light"], "answer": "It is moving away faster", "explanation": "Greater red-shift is evidence that more distant galaxies are moving away faster."}, {"topic": "Planets and Orbits – Exam Style", "question": "Why is the Sun described as a star?", "options": ["It produces energy by nuclear fusion", "It orbits Earth", "It is a planet with rings", "It reflects light from the Moon"], "answer": "It produces energy by nuclear fusion", "explanation": "Stars produce their own energy by nuclear fusion. The Sun is the star at the centre of our Solar System."}, {"topic": "Planets and Orbits – Exam Style", "question": "Why does the Moon orbit Earth rather than the Sun directly as its main orbit?", "options": ["Earth’s gravity provides the main centripetal force for the Moon’s orbit around Earth", "The Moon has no mass", "There is air resistance in space", "The Sun repels the Moon"], "answer": "Earth’s gravity provides the main centripetal force for the Moon’s orbit around Earth", "explanation": "The Moon is held in orbit around Earth by Earth’s gravitational attraction."}, {"topic": "Planets and Orbits – Exam Style", "question": "A student says astronauts in orbit have no gravity acting on them. What is the best correction?", "options": ["Gravity acts on them and keeps them in orbit", "Gravity only acts at night", "Gravity becomes magnetism", "Gravity only acts on planets"], "answer": "Gravity acts on them and keeps them in orbit", "explanation": "Astronauts in orbit still experience gravity. They feel weightless because they are falling around Earth with their spacecraft."}];
const app=document.getElementById('app');let currentQuestion=0,selectedAnswer=null,showExplanation=false,score=0,quizFinished=false;
function validateQuestions(qs){return qs.length===50&&qs.every(i=>i.topic&&i.question&&Array.isArray(i.options)&&i.options.length===4&&i.options.includes(i.answer)&&i.explanation)}
function escapeHtml(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function render(){if(!validateQuestions(questions)){app.innerHTML='<div class="result"><h1>Quiz data error</h1><p>One or more questions is missing an answer, four options, or an explanation.</p></div>';return}
if(quizFinished){const p=Math.round(score/questions.length*100);let m='Keep practising — review the explanations and try again! 💪',c='var(--red)';if(score>=42){m='Excellent work! Newton and space master! 🌟';c='var(--green)'}else if(score>=32){m="Great job! A bit more practice and you'll smash it! 📚";c='var(--yellow)'}app.innerHTML=`<section class="result"><h1>🎉 Quiz Complete!</h1><p class="result-score">Martha scored <strong style="color:var(--indigo)">${score}</strong> out of <strong>${questions.length}</strong></p><p>That is ${p}%.</p><p class="result-message" style="color:${c}">${m}</p><button class="restart" type="button" onclick="restartQuiz()">Restart Quiz</button></section>`;return}
const q=questions[currentQuestion],progress=(currentQuestion+1)/questions.length*100;app.innerHTML=`<section><div class="top"><div><h1>🪐 Newton’s Laws & Planets Quiz</h1><p class="subtitle">50-question WJEC GCSE Physics revision for Martha</p></div><div class="score">Score: ${score}</div></div><div class="meta"><span>${escapeHtml(q.topic)}</span><span>Question ${currentQuestion+1} / ${questions.length}</span></div><div class="progress" aria-label="Quiz progress"><div class="progress-bar" style="width:${progress}%"></div></div><h2 class="question">${escapeHtml(q.question)}</h2><div class="options">${q.options.map(o=>{let cls='option';if(showExplanation){if(o===q.answer)cls+=' correct';else if(o===selectedAnswer)cls+=' wrong'}return `<button class="${cls}" type="button" ${showExplanation?'disabled':''} onclick="handleAnswer('${encodeURIComponent(o)}')">${escapeHtml(o)}</button>`}).join('')}</div><div class="explanation ${showExplanation?'show':''}"><h2>${selectedAnswer===q.answer?'✅ Correct!':'❌ Not Quite'}</h2><p><strong>Correct Answer:</strong> ${escapeHtml(q.answer)}</p><p>${escapeHtml(q.explanation)}</p></div><div class="actions">${showExplanation?`<button class="next" type="button" onclick="nextQuestion()">${currentQuestion+1===questions.length?'Finish Quiz':'Next Question'}</button>`:''}</div><div class="footer">The quiz starts with introduction questions, then moves into harder WJEC-style exam practice on Newton’s laws, forces, planets, orbits and the expanding Universe.</div></section>`}
function handleAnswer(x){if(showExplanation)return;const o=decodeURIComponent(x),q=questions[currentQuestion];selectedAnswer=o;showExplanation=true;if(o===q.answer)score++;render()}
function nextQuestion(){if(currentQuestion+1<questions.length){currentQuestion++;selectedAnswer=null;showExplanation=false}else quizFinished=true;render();window.scrollTo({top:0,behavior:'smooth'})}
function restartQuiz(){currentQuestion=0;selectedAnswer=null;showExplanation=false;score=0;quizFinished=false;render();window.scrollTo({top:0,behavior:'smooth'})}
render();
</script></body></html>
